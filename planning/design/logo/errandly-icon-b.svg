<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Errandly icon B">
  <!-- Letter E built from 3 rounded bars + a vertical stem -->
  <!-- vertical stem -->
  <rect x="128" y="120" width="46" height="272" rx="23" fill="#000000"/>
  <!-- top bar -->
  <rect x="128" y="120" width="220" height="46" rx="23" fill="#000000"/>
  <!-- bottom bar -->
  <rect x="128" y="346" width="220" height="46" rx="23" fill="#000000"/>
  <!-- middle bar (shorter) in AMBER, pushed forward like a motion dash -->
  <rect x="128" y="233" width="180" height="46" rx="23" fill="#F2A104"/>
  <!-- small forward motion dash continuing the amber bar -->
  <rect x="326" y="233" width="58" height="46" rx="23" fill="#F2A104"/>
</svg>
