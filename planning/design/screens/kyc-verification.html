<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Errandly — Verify identity (KYC)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#000;--white:#fff;--amber:#F2A104;--amber-soft:#FDF0D5;--amber-pressed:#D98E00;
        --body:#5e5e5e;--mute:#afafaf;--soft:#efefef;--pressed:#e2e2e2;--success:#0F8A50}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,Arial,sans-serif;background:#e9e9ee;display:flex;justify-content:center;padding:32px}
  .device{width:390px;height:844px;background:var(--white);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.14);display:flex;flex-direction:column}

  .nav{padding:18px 20px 6px;display:flex;align-items:center;gap:14px}
  .back{width:38px;height:38px;border-radius:999px;background:var(--soft);display:flex;align-items:center;justify-content:center}
  .back svg{width:18px;height:18px}

  .steps{display:flex;gap:8px;padding:8px 20px 0}
  .step{height:6px;flex:1;border-radius:999px;background:var(--soft)}
  .step.on{background:var(--amber)}
  .steplabel{padding:10px 20px 0;font-size:13px;font-weight:500;color:var(--body)}

  .body{flex:1;overflow-y:auto;padding:16px 20px 28px}
  h1{font-weight:700;font-size:24px;letter-spacing:-.01em;margin-bottom:6px}
  .sub{font-size:15px;color:var(--body);margin-bottom:20px}

  .row{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--soft);border-radius:16px;padding:16px;margin-bottom:12px}
  .ic{width:44px;height:44px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ic svg{width:22px;height:22px}
  .rc{flex:1;min-width:0}
  .rt{font-weight:700;font-size:16px}
  .rs{font-size:13px;color:var(--body);margin-top:2px}
  .tag{font-weight:600;font-size:12px;padding:6px 14px;border-radius:999px;white-space:nowrap}
  .tag-upload{background:var(--amber-soft);color:var(--amber-pressed)}
  .tag-done{background:var(--soft);color:var(--success);display:inline-flex;align-items:center;gap:5px}
  .chev{color:var(--mute);font-size:20px}

  .note{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13px;color:var(--body)}
  .note svg{width:18px;height:18px;flex-shrink:0}

  .foot{padding:16px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--soft)}
  .btn{width:100%;background:var(--amber);color:#000;font-family:inherit;font-weight:600;font-size:16px;border:0;border-radius:999px;padding:16px;cursor:pointer}
</style>
</head>
<body>
  <div class="device">
    <div class="nav">
      <div class="back"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>

    <!-- Stepper -->
    <div class="steps">
      <span class="step on"></span>
      <span class="step"></span>
      <span class="step"></span>
    </div>
    <div class="steplabel">Step 1 of 3</div>

    <div class="body">
      <h1>Verify your identity</h1>
      <div class="sub">Required before you can get paid. It only takes a minute.</div>

      <!-- 1: Government ID -->
      <div class="row">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="#000" stroke-width="1.8"/><circle cx="8.5" cy="11" r="2" stroke="#000" stroke-width="1.6"/><path d="M14 10h4M14 13h4M5.5 15.5c.6-1.4 4.4-1.4 5 0" stroke="#000" stroke-width="1.6" stroke-linecap="round"/></svg></div>
        <div class="rc">
          <div class="rt">Government ID</div>
          <div class="rs">Front &amp; back of your ID</div>
        </div>
        <span class="tag tag-upload">Upload</span>
      </div>

      <!-- 2: Selfie -->
      <div class="row">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="4" stroke="#000" stroke-width="1.8"/><path d="M5 20c0-3.5 3.5-5 7-5s7 1.5 7 5" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg></div>
        <div class="rc">
          <div class="rt">Selfie check</div>
          <div class="rs">Take a quick selfie to match your ID</div>
        </div>
        <span class="chev">›</span>
      </div>

      <!-- 3: Payout -->
      <div class="row">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2" stroke="#000" stroke-width="1.8"/><path d="M3 10h18M7 15h4" stroke="#000" stroke-width="1.8" stroke-linecap="round"/></svg></div>
        <div class="rc">
          <div class="rt">Payout details</div>
          <div class="rs">Bank account or mobile wallet</div>
        </div>
        <span class="chev">›</span>
      </div>

      <div class="note">
        <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="2" stroke="#5e5e5e" stroke-width="1.8"/><path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="#5e5e5e" stroke-width="1.8"/></svg>
        Your documents are encrypted and only used for verification.
      </div>
    </div>

    <div class="foot">
      <button class="btn">Submit for review</button>
    </div>
  </div>
</body>
</html>
