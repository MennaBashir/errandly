<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Errandly — Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#000000; --white:#ffffff; --amber:#F2A104;
    --body:#5e5e5e; --mute:#afafaf; --soft:#efefef;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:Inter,system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    background:var(--white);
    display:flex;align-items:center;justify-content:center;
  }
  /* phone frame just for preview; the screen itself is the white surface */
  .device{
    width:390px;height:844px;background:var(--white);position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:44px;box-shadow:0 24px 80px rgba(0,0,0,.12);overflow:hidden;
  }

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;width:100%}

  /* logo mark */
  .mark{width:132px;height:132px;display:block}
  .mark .check{
    stroke-dasharray:150;stroke-dashoffset:150;
    animation:draw .7s ease .35s forwards;
  }
  .lockup{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:rise .6s ease .2s forwards}
  .word{font-weight:700;font-size:34px;letter-spacing:-.02em;color:var(--ink)}
  .tag{font-weight:400;font-size:14px;color:var(--body)}

  /* footer loader */
  .footer{position:absolute;bottom:56px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:14px}
  .loader{width:120px;height:4px;border-radius:999px;background:var(--soft);overflow:hidden}
  .loader::before{content:"";display:block;height:100%;width:40%;border-radius:999px;background:var(--amber);
    animation:slide 1.2s ease-in-out infinite}
  .ver{font-size:12px;color:var(--mute)}

  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes slide{0%{transform:translateX(-120%)}50%{transform:translateX(120%)}100%{transform:translateX(300%)}}
</style>
</head>
<body>
  <div class="device" role="img" aria-label="Errandly splash screen">
    <div class="stage">
      <!-- Logo mark: ink pin + white disc + amber check -->
      <svg class="mark" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M256 48 C167.6 48 96 119.6 96 208 c0 106 128 236 151.2 257.6 a12.9 12.9 0 0 0 17.6 0 C288 444 416 314 416 208 C416 119.6 344.4 48 256 48 Z" fill="#000000"/>
        <circle cx="256" cy="204" r="92" fill="#FFFFFF"/>
        <path class="check" d="M214 206 l30 30 l58 -66" fill="none" stroke="#F2A104" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

      <div class="lockup">
        <div class="word">Errandly</div>
        <div class="tag">Get anything done</div>
      </div>
    </div>

    <div class="footer">
      <div class="loader" aria-hidden="true"></div>
      <div class="ver">v1.0</div>
    </div>
  </div>
</body>
</html>
