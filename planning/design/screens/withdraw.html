<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Errandly — Withdraw</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#000;--white:#fff;--amber:#F2A104;--body:#5e5e5e;--mute:#afafaf;--soft:#efefef;--pressed:#e2e2e2;--ondark:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,Arial,sans-serif;background:#e9e9ee;display:flex;justify-content:center;padding:32px}
  .device{width:390px;height:844px;background:var(--white);border-radius:44px;overflow:hidden;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.14);display:flex;flex-direction:column}

  .nav{padding:18px 20px 6px;display:flex;align-items:center;gap:14px}
  .back{width:38px;height:38px;border-radius:999px;background:var(--soft);display:flex;align-items:center;justify-content:center}
  .back svg{width:18px;height:18px}
  .h1{font-weight:700;font-size:22px;letter-spacing:-.01em}

  .body{flex:1;overflow-y:auto;padding:12px 20px 24px}

  .bal{background:var(--ink);color:var(--ondark);border-radius:16px;padding:16px 18px;display:flex;flex-direction:column;gap:2px;margin-bottom:24px}
  .bal .lbl{font-size:13px;color:#c6c6c6}
  .bal .val{font-weight:700;font-size:24px}

  .amount{display:flex;align-items:baseline;gap:6px;border-bottom:2px solid var(--ink);padding-bottom:10px;margin-bottom:8px}
  .amount .cur{font-weight:700;font-size:32px;color:var(--ink)}
  .amount input{border:0;outline:0;font-family:inherit;font-weight:700;font-size:32px;color:var(--ink);width:100%}
  .all{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:26px;display:inline-block}

  .sec{font-size:13px;font-weight:600;color:var(--body);letter-spacing:.03em;text-transform:uppercase;margin-bottom:10px}
  .dest{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--soft);border-radius:16px;padding:16px;margin-bottom:12px}
  .dest.sel{border:2px solid var(--ink)}
  .ic{width:42px;height:42px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .ic svg{width:22px;height:22px}
  .dc{flex:1;min-width:0}
  .dt{font-weight:700;font-size:15px}
  .ds{font-size:13px;color:var(--body)}
  .check{width:24px;height:24px;border-radius:999px;background:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .check svg{width:14px;height:14px}
  .radio{width:22px;height:22px;border-radius:999px;border:2px solid var(--pressed);flex-shrink:0}
  .add{color:var(--body);font-weight:500}
  .info{font-size:13px;color:var(--body);margin-top:8px}

  .foot{padding:16px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--soft)}
  .btn{width:100%;background:var(--amber);color:#000;font-family:inherit;font-weight:600;font-size:16px;border:0;border-radius:999px;padding:16px;cursor:pointer}
</style>
</head>
<body>
  <div class="device">
    <div class="nav">
      <div class="back"><svg viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="h1">Withdraw</div>
    </div>

    <div class="body">
      <div class="bal">
        <span class="lbl">Available to withdraw</span>
        <span class="val">$248.50</span>
      </div>

      <div class="amount"><span class="cur">$</span><input value="200" inputmode="decimal"></div>
      <span class="all">Withdraw all</span>

      <div class="sec">Destination</div>

      <!-- selected bank -->
      <div class="dest sel">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M4 10h16M5 10l7-5 7 5M6 10v7M18 10v7M4 20h16" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="dc"><div class="dt">Chase ···· 8842</div><div class="ds">Bank account</div></div>
        <div class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#000" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>

      <!-- mobile wallet -->
      <div class="dest">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="18" rx="2" stroke="#000" stroke-width="1.7"/><path d="M10 18h4" stroke="#000" stroke-width="1.7" stroke-linecap="round"/></svg></div>
        <div class="dc"><div class="dt">Mobile wallet</div><div class="ds">Instant · +1 555 0134</div></div>
        <div class="radio"></div>
      </div>

      <!-- add new -->
      <div class="dest">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="#000" stroke-width="1.9" stroke-linecap="round"/></svg></div>
        <div class="dc"><div class="dt add">Add new method</div></div>
      </div>

      <div class="info">Arrives in 1–2 business days · no fee</div>
    </div>

    <div class="foot">
      <button class="btn">Confirm withdrawal</button>
    </div>
  </div>
</body>
</html>
